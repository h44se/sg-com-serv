services:
  backend:
    build:
      context: ./backend
    environment:
      PYTHONUNBUFFERED: "1"
      DASHBOARD_SNAPSHOT_CACHE_PATH: /var/lib/f1dashboard/dashboard-snapshot.json
    ports:
      - "8000:8000"
    volumes:
      - dashboard_cache:/var/lib/f1dashboard
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  dashboard_cache:
