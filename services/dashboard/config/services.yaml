- Events:
    - Calendar:
        widget:
          type: calendar
          view: monthly
          maxEvents: 10
          showTime: true
          timezone: Europe/Berlin
          integrations:
            - type: ical
              color: green
              url: {{HOMEPAGE_VAR_CALENDAR_URL}}
    - Agenda:
        widget:
          type: calendar
          view: agenda
          maxEvents: 10
          showTime: true
          previousDays: 3
          integrations:
            - type: ical
              color: green
              showTime: true
              url: {{HOMEPAGE_VAR_CALENDAR_URL}}

- Communication:
    - TeamSpeak 3:
        icon: teamspeak.png
        href: ts3server://ts.gonova.cloud
        description: Voice Server
        server: local
        container: teamspeak3
        widget:
          type: customapi
          url: http://tswatch:5000/status
          refreshInterval: 60000
          mappings:
            - field: status
              label: Status
              format: status
            - field: users
              label: Online
              format: number
            - field: max_users
              label: Slot-Limit
              format: number

- Security & Proxy:
    - Netdata:
        icon: netdata.png
        href: https://netdata.gonova.cloud
        description: Real-time monitoring
        server: local
        container: netdata
        widget:
          type: netdata
          url: http://netdata:19999
    - CrowdSec:
        icon: crowdsec.png
        description: Community Threat Intel
        href: https://crowdsec.net/
        server: local
        container: crowdsec
        widget:
          type: crowdsec
          url: http://crowdsec:8080
          username: {{HOMEPAGE_VAR_CROWDSEC_USER}}
          password: {{HOMEPAGE_VAR_CROWDSEC_PASS}}
          fields: ["bans"]
    - Caddy:
        icon: caddy.png
        description: Reverse Proxy Management
        server: local
        container: caddy
    - Fail2Ban:
        icon: fail2ban.png
        description: Intrusion Prevention